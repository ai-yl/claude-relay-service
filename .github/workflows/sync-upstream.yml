name: Sync Fork with Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync main from upstream
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/Wei-Shaw/claude-relay-service.git
          git fetch upstream main

          BEFORE="$(git rev-parse HEAD)"
          BASE="$(git merge-base HEAD upstream/main)"
          UPSTREAM="$(git rev-parse upstream/main)"

          if [ "$BASE" = "$UPSTREAM" ]; then
            echo "Already up to date with upstream."
            exit 0
          fi

          if ! git merge --no-ff --no-edit upstream/main; then
            git merge --abort || true
            echo "Merge conflict detected while syncing from upstream." >&2
            exit 1
          fi

          AFTER="$(git rev-parse HEAD)"
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "No new commits from upstream."
            exit 0
          fi

          git push origin HEAD:main
