name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: ${{ vars.GCP_CLOUD_RUN_SERVICE || 'claude-relay-service' }}
  REDIS_INSTANCE: ${{ vars.GCP_REDIS_INSTANCE || 'claude-relay-service-redis' }}
  VPC_NETWORK: ${{ vars.GCP_VPC_NETWORK || 'default' }}
  VPC_CONNECTOR: ${{ vars.GCP_VPC_CONNECTOR || 'crs-connector' }}
  CONNECTOR_SUBNET: ${{ vars.GCP_VPC_CONNECTOR_SUBNET || 'crs-connector-subnet' }}
  CONNECTOR_SUBNET_RANGE: ${{ vars.GCP_VPC_CONNECTOR_SUBNET_RANGE || '172.16.0.0/28' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy
        run: ./scripts/deploy-gcp-cloud-run.sh
